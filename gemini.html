<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Advanced 官方代充中心</title>
    <style>
        /* 页面整体样式 - 科技感深色风格 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0d14;
            color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 商城卡片容器 */
        .shop-container {
            background: #161925;
            border: 1px solid #2a2e45;
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        /* 头部标题与Gemini渐变色 */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 22px;
            margin: 0;
            background: linear-gradient(45deg, #4285f4, #9b51e0, #e91e63);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 5px;
        }

        /* 商品选择区域 */
        .section-title {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 10px;
        }

        .plan-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .plan-card {
            background: #222638;
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .plan-card:hover {
            border-color: #4285f4;
        }

        .plan-card.active {
            background: #1e293b;
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
        }

        .plan-time {
            font-size: 14px;
            font-weight: bold;
            display: block;
        }

        .plan-price {
            font-size: 16px;
            color: #3b82f6;
            font-weight: bold;
            margin-top: 5px;
            display: block;
        }

        /* 输入框样式 */
        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 6px;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            background: #1f2335;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 10px 12px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: #3b82f6;
        }

        /* 支付方式选择 */
        .pay-methods {
            display: flex;
            gap: 15px;
            margin-bottom: 24px;
        }

        .pay-btn {
            flex: 1;
            background: #1f2335;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .pay-btn.active {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        /* 模拟后端的弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            width: 280px;
        }

        .qrcode-box {
            width: 180px;
            height: 180px;
            background: #eee;
            margin: 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #666;
            border: 1px solid #ccc;
        }

        .close-modal {
            margin-top: 15px;
            background: #e5e7eb;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="shop-container">
        <div class="header">
            <h1>✨ Gemini Advanced 代充中心</h1>
            <p>官方正规渠道 · 独立账号升级 · 稳定不掉线</p>
        </div>

        <!-- 1. 商品规格选择 -->
        <div class="section-title">选择充值时长</div>
        <div class="plan-list">
            <div class="plan-card active" data-price="150">
                <span class="plan-time">1 个月</span>
                <span class="plan-price">¥150</span>
            </div>
            <div class="plan-card" data-price="420">
                <span class="plan-time">3 个月</span>
                <span class="plan-price">¥420</span>
            </div>
            <div class="plan-card" data-price="780">
                <span class="plan-time">6 个月</span>
                <span class="plan-price">¥780</span>
            </div>
        </div>

        <!-- 2. 客户资料填写 -->
        <div class="input-group">
            <label for="email">接收通知的邮箱</label>
            <input type="email" id="email" placeholder="example@qq.com" required>
        </div>

        <div class="input-group">
            <label for="account">您的 Google 账号密码（请务必填写正确）</label>
            <textarea id="account" rows="2" placeholder="账号：xxx@gmail.com&#10;密码：xxxxxx"></textarea>
        </div>

        <!-- 3. 支付方式 -->
        <div class="section-title">选择支付方式</div>
        <div class="pay-methods">
            <div class="pay-btn active" data-method="微信支付">🟢 微信支付</div>
           
        </div>

        <!-- 4. 提交按钮 -->
        <button class="submit-btn" id="pay-now">立即支付 ¥150</button>
    </div>

    <!-- 模拟收银台弹窗 -->
    <div class="modal" id="pay-modal">
        <div class="modal-content">
            <h3 id="modal-title">微信支付收银台</h3>
            <p style="font-size: 14px; color: #666;">请扫描下方二维码支付 <span id="modal-price" style="color:red; font-weight:bold;"></span></p>
            <!-- 实际项目中这里是后端生成的支付二维码，这里用色块模拟 -->
           <img src="my-pay.png" style="width: 200px; height: 200px; display: block; margin: 10px auto;" />
            <button class="close-modal" id="close-btn">关闭窗口</button>
        </div>
    </div>

    <script>
        // 前端交互 JavaScript 逻辑
        const planCards = document.querySelectorAll('.plan-card');
        const payBtns = document.querySelectorAll('.pay-btn');
        const submitBtn = document.getElementById('pay-now');
        const modal = document.getElementById('pay-modal');
        const closeModalBtn = document.getElementById('close-btn');

        let currentPrice = 150;
        let currentMethod = '微信支付';

        // 切换套餐规格
        planCards.forEach(card => {
            card.addEventListener('click', () => {
                planCards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                currentPrice = card.getAttribute('data-price');
                submitBtn.innerText = `立即支付 ¥${currentPrice}`;
            });
        });

        // 切换支付方式
        payBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                payBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMethod = btn.getAttribute('data-method');
            });
        });

        // 点击立即支付（模拟将数据传给后端并弹出支付码）
        submitBtn.addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const account = document.getElementById('account').value;

            if(!email || !account) {
                alert('请填写完整的邮箱和账号密码信息！');
                return;
            }

            // 修改弹窗内容
            document.getElementById('modal-title').innerText = `${currentMethod} 收银台`;
            document.getElementById('modal-price').innerText = `¥${currentPrice}`;
            
            // 显示弹窗
            modal.style.display = 'flex';
        });

        // 关闭弹窗
        closeModalBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });
    </script>
</body>
</html>
